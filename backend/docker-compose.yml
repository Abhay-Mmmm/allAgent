services:
  postgres:
    image: postgres:16-alpine
    container_name: allagent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: allagent
      POSTGRES_PASSWORD: allagent_local
      POSTGRES_DB: allagent
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: