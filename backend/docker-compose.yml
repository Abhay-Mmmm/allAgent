version: "3.9"

services:
  # ── Local PostgreSQL (mirrors Railway's managed Postgres) ──────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: allagent
      POSTGRES_PASSWORD: allagent_local
      POSTGRES_DB: allagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U allagent" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override DATABASE_URL to use local docker postgres service
      DATABASE_URL: postgresql://allagent:allagent_local@postgres:5432/allagent
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
